<html>
<head>
  <title>Email</title>
  
</head>
<body>
    <div id="contato_form">
	<h2>Teste de envio de e-mail</h2>
	
      <form action="action_page2.php" name="form_contato" method="post" >
      <p class="titulo">Formulário <small>*Campos Obrigatorios</small></p>
        <table align="center">
          <tr>
            <td>Nome:<sup>*</sup></td>
            <td>
              <input type="text" name="Name" maxlength="40" />
            </td>
          </tr>
          <tr>
            <td>E-mail:<sup>*</sup></td>
            <td>
              <input type="email" name="Email" maxlength="50" />
            </td>
          </tr>
          <tr>
            <td>Assunto:<sup>*</sup></td>
            <td>
              <input type="text" name="Subject" />
            </td>
          </tr>
          <tr>
            <td>Mensagem:<sup>*</sup></td>
            <td>
              <textarea name="Message" cols="16" rows="5"></textarea>
            </td>
          </tr>
          <tr align="right";>
            <td colspan="2">
              <input type="reset" class="campo_submit" value="Limpar" />
              <input type="submit" class="campo_submit" value="Enviar" name="Enviar" />
            </td>
          </tr>
          <tr>
            <td colspan="2" align="right"><small>* Campos obrigatorios</small></td>
          </tr>
        </table>
      </form>
    </div>
</body>
</html>
